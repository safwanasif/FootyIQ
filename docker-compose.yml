# ============================================================================
# FootyIQ Local Development Environment (docker-compose.yml)
# ============================================================================
# PURPOSE:
#   Orchestrates the full backend ecosystem — PostgreSQL, Python ML service,
#   and the Node/Express API gateway — onto a single virtual bridge network.
#
# CONTAINER DNS (architecture note):
#   All three services attach to the `footyiq-net` bridge network. Docker's
#   embedded DNS server resolves each service's NAME (db, ml, api) to that
#   container's internal IP on this network automatically. This is why the
#   `api` service's ML_SERVICE_URL is set to `http://ml:5000` instead of
#   `http://localhost:5000` — "ml" is the hostname Docker resolves to the
#   ml container, NOT a port on api's own container. localhost inside a
#   container refers to that container itself, so this distinction matters:
#   using localhost here would make api try to call itself and fail.
#
# ARCHITECTURE MAPPING:
#   - db (PostgreSQL):    Stores match, event, and xG model data
#   - ml (Python/FastAPI): Serves xG predictions from the trained model
#   - api (Node/Express):  Gateway; validates requests, proxies to ml
#
# USAGE:
#   docker compose up --build -d     # Build images and start all services
#   docker compose ps                # Check container status
#   docker compose logs -f api       # Tail logs for a specific service
#   docker compose down              # Stop and remove all containers
# ============================================================================

version: '3.8'

services:
  # ========================================================================
  # PostgreSQL Database Service
  # ========================================================================
  db:
    image: postgres:15-alpine
    container_name: footyiq_db
    environment:
      POSTGRES_USER: footyiq_user
      POSTGRES_PASSWORD: footyiq_pass
      POSTGRES_DB: footyiq
    ports:
      - "5432:5432"
    volumes:
      # Named volume persists data across container restarts/rebuilds
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U footyiq_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - footyiq-net

  # ========================================================================
  # Python ML Inference Service
  # ========================================================================
  ml:
    build:
      context: ./services/ml
      dockerfile: Dockerfile
    container_name: footyiq_ml
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - footyiq-net

  # ========================================================================
  # Node.js / TypeScript API Gateway
  # ========================================================================
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: footyiq_api
    ports:
      - "3001:3001"
    environment:
      # Resolved via Docker's internal DNS — "ml" is the service name
      # above, not a literal hostname. See CONTAINER DNS note at top.
      ML_SERVICE_URL: http://ml:5000
      PORT: 3001
      NODE_ENV: production
    depends_on:
      - ml
      - db
    networks:
      - footyiq-net

# ============================================================================
# TOP-LEVEL NETWORK DEFINITION
# ============================================================================
# footyiq-net: custom bridge network. Docker Compose's default bridge
# network already provides DNS resolution between services, but declaring
# a named network explicitly documents the shared backend boundary and
# keeps this project's containers isolated from other Docker projects
# running on the same host.
networks:
  footyiq-net:
    driver: bridge

# ============================================================================
# TOP-LEVEL VOLUME DEFINITION
# ============================================================================
volumes:
  pgdata:
    driver: local